name: KT ALPHA 통합 테스트(PC)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: Playwright 브라우저 설치
        run: npx playwright install chromium

      - name: PC 통합 테스트 실행
        id: test
        env:
          LOGIN_ID: ${{ secrets.LOGIN_ID }}
          LOGIN_PW: ${{ secrets.LOGIN_PW }}
          NAME: ${{ secrets.NAME }}
          YEAR: ${{ secrets.YEAR }}
          MONTH: ${{ secrets.MONTH }}
          DAY: ${{ secrets.DAY }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          BASE_URL: https://www.kshop.co.kr/
        run: npx playwright test tests/pc/integrated --project=pc-no-auth --headed
        continue-on-error: true

      - name: Allure 리포트 생성
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report
          sed -i '' 's/lang="en"/lang="kr"/' allure-report/index.html
          sed -i '' 's/sorter:`sorter.name`/sorter:`sorter.order`/' allure-report/assets/*.js

      - name: GitHub Pages 배포
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: 히스토리 develop 브랜치에 누적
        if: always()
        run: |
          TEMP=$(mktemp -d)
          git clone --depth=1 --branch=develop https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/HUJO733/kt_alpha_auto.git "$TEMP"
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          mkdir -p "$TEMP/allure-runs/$TIMESTAMP"
          cp allure-results/*-result.json "$TEMP/allure-runs/$TIMESTAMP/" 2>/dev/null || true
          cd "$TEMP"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add allure-runs/
          git diff --cached --quiet || git commit -m "chore: 테스트 결과 누적 [$TIMESTAMP] [skip ci]"
          git push origin develop
          cd -
          rm -rf "$TEMP"

      - name: Slack 알림
        if: always()
        run: |
          STATUS="${{ steps.test.outcome }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            TEXT="통과"
          else
            EMOJI="❌"
            TEXT="실패"
          fi

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {\"type\": \"plain_text\", \"text\": \"${EMOJI} PC 통합 테스트 ${TEXT}\"}
                },
                {
                  \"type\": \"section\",
                  \"text\": {\"type\": \"mrkdwn\", \"text\": \"<https://hujo733.github.io/kt_alpha_auto|📊 Allure 리포트 보기>\"}
                }
              ]
            }"
